<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Home{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header>
      <div class="header-container">
        <h1>NBRY Lifting</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" type="button">
          🌙
        </button>
      </div>
      <nav aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/instructions">Instructions</a>
        <a href="/faq">FAQ</a>
        <a href="/resources">Resources</a>
        <a href="/links">Links</a>
        <a href="/changelog">Changelog</a>
      </nav>
    </header>

    <main id="main-content">{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2026 NBRY Lifting. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', path='js/theme.js') }}" defer></script>
  </body>
</html>
