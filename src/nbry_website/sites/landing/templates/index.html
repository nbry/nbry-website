<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="nbry — personal sites by Nathan Bryant: lifting, career, and more."
    />
    <title>nbry</title>
    <link rel="stylesheet" href="/static/css/main.css" />
    <link rel="icon" type="image/svg+xml" href="/shared/favicon.svg" />
  </head>
  <body>
    <div class="landing-container">
      <header class="landing-header">
        <h1>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            width="64"
            height="64"
            aria-label="nbry"
            role="img"
          >
            <text
              x="9"
              y="11"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="18"
              font-weight="700"
              fill="#ef4444"
              text-anchor="middle"
              dominant-baseline="central"
            >
              n
            </text>
            <text
              x="23"
              y="11"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="18"
              font-weight="700"
              fill="#fbbf24"
              text-anchor="middle"
              dominant-baseline="central"
            >
              b
            </text>
            <text
              x="9"
              y="21"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="18"
              font-weight="700"
              fill="#51cf66"
              text-anchor="middle"
              dominant-baseline="central"
            >
              r
            </text>
            <text
              x="23"
              y="21"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="18"
              font-weight="700"
              fill="#c084fc"
              text-anchor="middle"
              dominant-baseline="central"
            >
              y
            </text>
          </svg>
        </h1>
        <p class="tagline">My collection of websites</p>
      </header>

      <main class="sites-grid">
        {% for site in sites %}
          <div class="site-card {% if site.coming_soon %}coming-soon{% endif %}">
            <div class="site-icon">{{ site.icon }}</div>
            <h2>{{ site.name }}</h2>
            <p>{{ site.description }}</p>
            {% if site.coming_soon %}
              <span class="badge">Coming Soon</span>
            {% else %}
              <a href="{{ site.url }}" class="button">Visit Site →</a>
            {% endif %}
          </div>
        {% endfor %}
      </main>

      <footer class="landing-footer">
        <p>&copy; 2026 nbry. Licensed under MIT License</p>
      </footer>
    </div>
  </body>
</html>
