version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
      # SSH agent forwarding
      - type: bind
        source: ${SSH_AUTH_SOCK:-/dev/null}
        target: /ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/lifting_website
      - REDIS_URL=redis://redis:6379/0
      - PYTHON_VERSION=3.14
    command: sleep infinity
    depends_on:
      - postgres
      - redis
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifting_website
    ports:
      - "5432:5432"
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - dev-network

volumes:
  postgres-data:
  redis-data:

networks:
  dev-network:
