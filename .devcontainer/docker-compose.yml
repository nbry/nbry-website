version: "3.8"

services:
  system:
    hostname: dev
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace-nbry-libs:cached
      - home:/home/dev
      # SSH agent forwarding
      - type: bind
        source: ${SSH_AUTH_SOCK:-/dev/null}
        target: /ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nbry_website
      - REDIS_URL=redis://redis:6379/0
      - PYTHON_VERSION=3.14
    command: sleep infinity
    depends_on:
      - postgres
      - redis
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nbry_website
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - dev-network

volumes:
  home:
  postgres-data:
  redis-data:

networks:
  dev-network:
